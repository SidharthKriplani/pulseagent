  <text x="668" y="316" fill="#94a3b8" font-size="10.5">    enter your domain name.</text>
  <text x="668" y="336" fill="#94a3b8" font-size="10.5">3.  Update your DNS at your registrar:</text>
  <text x="668" y="352" fill="#94a3b8" font-size="10.5">    • A record  →  <tspan fill="#06b6d4" font-family="'Courier New', monospace">23.236.62.147</tspan></text>
  <text x="668" y="368" fill="#94a3b8" font-size="10.5">    • CNAME     →  <tspan fill="#06b6d4" font-family="'Courier New', monospace">www.wixdns.net</tspan></text>
  <text x="668" y="392" fill="#f1f5f9" font-size="11">DNS propagation may take 24–48 hours [<tspan fill="#22c55e" font-weight="700">Source 2</tspan>]. You can</text>
  <text x="668" y="408" fill="#f1f5f9" font-size="11">monitor propagation status at <tspan fill="#06b6d4">whatsmydns.net</tspan>.</text>

