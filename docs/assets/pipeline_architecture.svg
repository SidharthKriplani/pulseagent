<svg viewBox="0 0 1300 680" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <marker id="arrow-main" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-amber" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-violet" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1300" height="680" fill="url(#bg)" rx="14"/>

  <!-- Title -->
  <text x="650" y="44" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700" letter-spacing="0.5">PulseAgent — Citation-Grounded Multi-Agent RAG</text>
  <text x="650" y="66" text-anchor="middle" fill="#64748b" font-size="11.5">LangGraph StateGraph  ·  Send() Fan-Out  ·  NLI Contract Gate  ·  GCP Cloud Run</text>

  <!-- ── SEND() FAN-OUT BADGE ── -->
  <rect x="474" y="78" width="232" height="30" rx="7" fill="#0f172a" stroke="#3b82f6" stroke-width="1.3"/>
  <text x="590" y="91" text-anchor="middle" fill="#3b82f6" font-size="9.5" font-weight="700">Send() parallel fan-out per sub-query</text>
  <text x="590" y="103" text-anchor="middle" fill="#60a5fa" font-size="8.5">Annotated[List[dict], operator.add] reducer</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- NODE 1: USER QUERY  cx=115  y=180..315 -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="20" y="180" width="190" height="135" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="20" y="180" width="5" height="135" rx="3" fill="#475569"/>
  <text x="115" y="210" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">① User Query</text>
  <line x1="30" y1="218" x2="200" y2="218" stroke="#334155" stroke-width="0.8"/>
  <text x="115" y="237" text-anchor="middle" fill="#94a3b8" font-size="10">Natural language</text>
  <text x="115" y="253" text-anchor="middle" fill="#94a3b8" font-size="10">question or task</text>
  <text x="115" y="278" text-anchor="middle" fill="#64748b" font-size="9.5">FastAPI POST /query</text>
  <text x="115" y="295" text-anchor="middle" fill="#64748b" font-size="9.5">X-API-Key · 10 req/min</text>

  <!-- Arrow 1→2 -->
  <line x1="210" y1="248" x2="248" y2="248" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-main)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- NODE 2: SUPERVISOR / PLANNER  cx=340  y=180..315 -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="250" y="180" width="190" height="135" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="250" y="180" width="5" height="135" rx="3" fill="#3b82f6"/>
  <text x="345" y="210" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">② Supervisor</text>
  <line x1="260" y1="218" x2="430" y2="218" stroke="#1e3a5f" stroke-width="0.8"/>
  <text x="345" y="237" text-anchor="middle" fill="#93c5fd" font-size="10">planner_node</text>
  <text x="345" y="253" text-anchor="middle" fill="#94a3b8" font-size="10">LLM decomposes</text>
  <text x="345" y="269" text-anchor="middle" fill="#94a3b8" font-size="10">query → sub-queries</text>
  <text x="345" y="290" text-anchor="middle" fill="#64748b" font-size="9">StateGraph · SupervisorState</text>
  <text x="345" y="305" text-anchor="middle" fill="#64748b" font-size="9">Send() fan-out per sub-query</text>

  <!-- Fan-out lines to top retriever -->
  <line x1="440" y1="220" x2="480" y2="180" stroke="#3b82f6" stroke-width="1.3" stroke-dasharray="4,2"/>
  <!-- Fan-out lines to bottom retriever -->
  <line x1="440" y1="276" x2="480" y2="340" stroke="#3b82f6" stroke-width="1.3" stroke-dasharray="4,2"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- NODE 3a: RETRIEVAL AGENT (top)  cx=590  y=120..235 -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="480" y="120" width="200" height="120" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="480" y="120" width="5" height="120" rx="3" fill="#10b981"/>
  <text x="580" y="148" text-anchor="middle" fill="#f1f5f9" font-size="12.5" font-weight="700">③ RetrievalAgent</text>
  <text x="580" y="163" text-anchor="middle" fill="#6ee7b7" font-size="9.5">sub-graph · sub-query 1</text>
  <line x1="490" y1="170" x2="670" y2="170" stroke="#134e3a" stroke-width="0.8"/>
  <text x="580" y="188" text-anchor="middle" fill="#94a3b8" font-size="9.5">BM25Okapi sparse</text>
  <text x="580" y="203" text-anchor="middle" fill="#94a3b8" font-size="9.5">fastembed dense 384-dim</text>
  <text x="580" y="218" text-anchor="middle" fill="#64748b" font-size="9">RRF fusion k=60</text>
  <text x="580" y="231" text-anchor="middle" fill="#64748b" font-size="9">top-K chunks → state</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- NODE 3b: RETRIEVAL AGENT (bottom)  cx=590  y=300..415 -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="480" y="300" width="200" height="120" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="480" y="300" width="5" height="120" rx="3" fill="#10b981"/>
  <text x="580" y="328" text-anchor="middle" fill="#f1f5f9" font-size="12.5" font-weight="700">③ RetrievalAgent</text>
  <text x="580" y="343" text-anchor="middle" fill="#6ee7b7" font-size="9.5">sub-graph · sub-query N</text>
  <line x1="490" y1="350" x2="670" y2="350" stroke="#134e3a" stroke-width="0.8"/>
  <text x="580" y="368" text-anchor="middle" fill="#94a3b8" font-size="9.5">BM25Okapi sparse</text>
  <text x="580" y="383" text-anchor="middle" fill="#94a3b8" font-size="9.5">fastembed dense 384-dim</text>
  <text x="580" y="398" text-anchor="middle" fill="#64748b" font-size="9">RRF fusion k=60</text>
  <text x="580" y="411" text-anchor="middle" fill="#64748b" font-size="9">top-K chunks → state</text>

  <!-- "×N" label between retrieval agents -->
  <text x="591" y="283" text-anchor="middle" fill="#475569" font-size="11" font-style="italic">×N parallel instances</text>

  <!-- Merge lines from both retrievers to aggregate -->
  <line x1="680" y1="175" x2="730" y2="248" stroke="#10b981" stroke-width="1.3" marker-end="url(#arrow-green)"/>
  <line x1="680" y1="360" x2="730" y2="268" stroke="#10b981" stroke-width="1.3" marker-end="url(#arrow-green)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- NODE 4: AGGREGATE  cx=820  y=180..315 -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="730" y="180" width="185" height="135" rx="10" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="730" y="180" width="5" height="135" rx="3" fill="#06b6d4"/>
  <text x="822" y="210" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">④ Aggregate</text>
  <line x1="740" y1="218" x2="905" y2="218" stroke="#164e63" stroke-width="0.8"/>
  <text x="822" y="237" text-anchor="middle" fill="#67e8f9" font-size="10">aggregate_node</text>
  <text x="822" y="253" text-anchor="middle" fill="#94a3b8" font-size="10">Dedup by article_id</text>
  <text x="822" y="269" text-anchor="middle" fill="#94a3b8" font-size="10">Re-rank by RRF score</text>
  <text x="822" y="290" text-anchor="middle" fill="#64748b" font-size="9">Annotated[List[dict],</text>
  <text x="822" y="305" text-anchor="middle" fill="#64748b" font-size="9">operator.add] reducer</text>

  <!-- Arrow 4→5 -->
  <line x1="915" y1="248" x2="953" y2="248" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-main)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- NODE 5: VERIFIER / NLI  cx=1048  y=180..315 -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="955" y="180" width="185" height="135" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="955" y="180" width="5" height="135" rx="3" fill="#f59e0b"/>
  <text x="1047" y="210" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">⑤ VerifierAgent</text>
  <line x1="965" y1="218" x2="1130" y2="218" stroke="#451a03" stroke-width="0.8"/>
  <text x="1047" y="237" text-anchor="middle" fill="#fcd34d" font-size="10">NLI sub-graph</text>
  <text x="1047" y="253" text-anchor="middle" fill="#94a3b8" font-size="10">deberta-v3-small</text>
  <text x="1047" y="269" text-anchor="middle" fill="#94a3b8" font-size="10">threshold ≥ 0.85</text>
  <text x="1047" y="287" text-anchor="middle" fill="#64748b" font-size="9">Claim conversion:</text>
  <text x="1047" y="301" text-anchor="middle" fill="#64748b" font-size="9">Q → declarative form</text>
  <text x="1047" y="315" text-anchor="middle" fill="#64748b" font-size="9">17ms/pair · 75.9% precision</text>

  <!-- Conditional arrows from Verifier -->
  <!-- ABSTAIN path (up-right) -->
  <line x1="1140" y1="220" x2="1215" y2="160" stroke="#f59e0b" stroke-width="1.4" stroke-dasharray="5,3" marker-end="url(#arrow-amber)"/>
  <!-- ANSWER path (down) -->
  <line x1="1085" y1="315" x2="1085" y2="360" stroke="#8b5cf6" stroke-width="1.4" marker-end="url(#arrow-violet)"/>

  <!-- ABSTAIN badge -->
  <rect x="1200" y="128" width="84" height="44" rx="8" fill="#451a03" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1242" y="148" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="800">ABSTAIN</text>
  <text x="1242" y="163" text-anchor="middle" fill="#fcd34d" font-size="9">no hallucination</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- NODE 6: SYNTHESIS  cx=1085  y=360..490 -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="985" y="360" width="200" height="130" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="985" y="360" width="5" height="130" rx="3" fill="#8b5cf6"/>
  <text x="1085" y="390" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">⑥ SynthesisAgent</text>
  <line x1="995" y1="398" x2="1175" y2="398" stroke="#2e1065" stroke-width="0.8"/>
  <text x="1085" y="417" text-anchor="middle" fill="#c4b5fd" font-size="10">generator_node</text>
  <text x="1085" y="433" text-anchor="middle" fill="#94a3b8" font-size="10">Groq llama-3.3-70b</text>
  <text x="1085" y="449" text-anchor="middle" fill="#94a3b8" font-size="10">grounded on verified chunks</text>
  <text x="1085" y="467" text-anchor="middle" fill="#64748b" font-size="9">reflector_node · self-critique</text>
  <text x="1085" y="481" text-anchor="middle" fill="#64748b" font-size="9">PASS → END  ·  RETRY → gen</text>

  <!-- Arrow from Synthesis to ANSWER badge -->
  <line x1="1085" y1="490" x2="1085" y2="535" stroke="#22c55e" stroke-width="1.4" marker-end="url(#arrow-green)"/>

  <!-- ANSWER_WITH_CITATION badge -->
  <rect x="975" y="538" width="222" height="44" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1086" y="558" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="800">ANSWER_WITH_CITATION</text>
  <text x="1086" y="573" text-anchor="middle" fill="#86efac" font-size="9">inline citation · verified chunks only</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- LEGEND / STATS BAR (bottom)  y=610..660 -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="20" y="608" width="1260" height="56" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>

  <text x="60" y="628" text-anchor="middle" fill="#64748b" font-size="9" font-weight="600">ANSWER RATE</text>
  <text x="60" y="648" text-anchor="middle" fill="#22c55e" font-size="16" font-weight="800">56%</text>

  <line x1="130" y1="614" x2="130" y2="658" stroke="#334155" stroke-width="0.8"/>

  <text x="200" y="628" text-anchor="middle" fill="#64748b" font-size="9" font-weight="600">ABSTAIN RATE</text>
  <text x="200" y="648" text-anchor="middle" fill="#f59e0b" font-size="16" font-weight="800">44%</text>

  <line x1="270" y1="614" x2="270" y2="658" stroke="#334155" stroke-width="0.8"/>

  <text x="355" y="628" text-anchor="middle" fill="#64748b" font-size="9" font-weight="600">NLI PRECISION</text>
  <text x="355" y="648" text-anchor="middle" fill="#8b5cf6" font-size="16" font-weight="800">75.9%</text>

  <line x1="435" y1="614" x2="435" y2="658" stroke="#334155" stroke-width="0.8"/>

  <text x="520" y="628" text-anchor="middle" fill="#64748b" font-size="9" font-weight="600">ERROR RATE</text>
  <text x="520" y="648" text-anchor="middle" fill="#f1f5f9" font-size="16" font-weight="800">0.0%</text>

  <line x1="590" y1="614" x2="590" y2="658" stroke="#334155" stroke-width="0.8"/>

  <text x="670" y="628" text-anchor="middle" fill="#64748b" font-size="9" font-weight="600">MEAN LATENCY</text>
  <text x="670" y="648" text-anchor="middle" fill="#06b6d4" font-size="16" font-weight="800">218ms</text>

  <line x1="745" y1="614" x2="745" y2="658" stroke="#334155" stroke-width="0.8"/>

  <text x="820" y="628" text-anchor="middle" fill="#64748b" font-size="9" font-weight="600">P95 LATENCY</text>
  <text x="820" y="648" text-anchor="middle" fill="#06b6d4" font-size="16" font-weight="800">247ms</text>

  <line x1="895" y1="614" x2="895" y2="658" stroke="#334155" stroke-width="0.8"/>

  <text x="1000" y="628" text-anchor="middle" fill="#64748b" font-size="9" font-weight="600">CORPUS</text>
  <text x="1000" y="648" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="700">6,221 articles</text>

  <line x1="1090" y1="614" x2="1090" y2="658" stroke="#334155" stroke-width="0.8"/>

  <text x="1195" y="628" text-anchor="middle" fill="#64748b" font-size="9" font-weight="600">EVAL QUERIES</text>
  <text x="1195" y="648" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="700">200 queries</text>
</svg>
